<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Engineering Wiki</title>
  <style>
    :root{
      --bg:#0b0f14;
      --text:#e7eef7;
      --muted:#a8b3c2;
      --line:rgba(255,255,255,.08);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 800px at 20% -10%, rgba(93,214,255,.12), transparent 60%),
                  radial-gradient(900px 700px at 80% 0%, rgba(139,92,246,.12), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:980px; margin:0 auto; padding:20px 16px 40px}
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; padding:14px 14px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid var(--line); border-radius:var(--r);
      box-shadow: var(--shadow);
      position: sticky; top: 12px; z-index: 10;
      backdrop-filter: blur(10px);
    }
    .brand{display:flex; align-items:center; gap:10px; min-width:0}
    .logo{
      width:34px; height:34px; border-radius:12px;
      background:linear-gradient(135deg, rgba(93,214,255,.9), rgba(139,92,246,.85));
      box-shadow: 0 10px 18px rgba(93,214,255,.12);
      flex:0 0 auto;
    }
    .brand h1{font-size:16px; margin:0; letter-spacing:.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .pill{
      font-size:12px; color:var(--muted);
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      padding:6px 10px; border-radius:999px;
      white-space:nowrap;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card + .card{ margin-top:12px; }
    .card .head{
      padding:14px 14px 10px;
      display:flex; align-items:flex-end; justify-content:space-between; gap:10px;
      border-bottom:1px solid var(--line);
      background: rgba(0,0,0,.15);
    }
    .card .head .title{font-size:14px; margin:0}
    .card .head .sub{font-size:12px; color:var(--muted); margin:0}
    .card .body{padding:10px 10px 12px}

    .search{
      margin:12px 2px 12px;
      display:flex; gap:10px; align-items:center;
      background: rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius: var(--r);
      padding:12px 12px;
    }
    .search input{
      width:100%;
      background:transparent;
      border:0; outline:0;
      color:var(--text);
      font-size:15px;
    }
    .search .kbd{
      color:var(--muted);
      font-size:12px;
      border:1px solid var(--line);
      padding:4px 8px;
      border-radius:10px;
      background: rgba(0,0,0,.18);
      user-select:none;
    }

    .list{display:flex; flex-direction:column; gap:8px}
    .row{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      padding:12px 12px;
      background: rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius: 14px;
      cursor:pointer;
      transition: transform .06s ease, background .12s ease;
    }
    .row:hover{background: rgba(255,255,255,.05)}
    .row:active{transform: scale(.99)}
    .row .left{min-width:0}
    .row .name{font-size:14px; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .row .meta{font-size:12px; margin:2px 0 0; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .row .chev{color:rgba(231,238,247,.7); font-size:18px; line-height:1}

    .muted{color:var(--muted)}
    .hidden{display:none !important}

    /* page view */
    .page{ padding:14px; }
    .page-top{
      display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap;
      margin-bottom:10px;
    }
    .btn{
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      color:var(--text);
      padding:10px 12px;
      border-radius: 14px;
      cursor:pointer;
    }
    .btn:hover{background: rgba(255,255,255,.05)}
    .page h2{margin:0; font-size:18px}
    .page p{margin:6px 0 0; color:var(--muted); font-size:13px}

    table{
      width:100%;
      border-collapse: collapse;
      margin-top:12px;
      overflow:hidden;
      border-radius: 14px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.18);
    }
    th, td{
      padding:10px 10px;
      text-align:left;
      border-bottom:1px solid var(--line);
      font-size:13px;
      vertical-align:top;
    }
    th{color:rgba(231,238,247,.9); font-weight:600; background: rgba(255,255,255,.04)}
    tr:last-child td{border-bottom:0}
    .note{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      border:1px dashed var(--line);
      background: rgba(255,255,255,.02);
      padding:10px 12px;
      border-radius: 14px;
    }
    .footer{
      margin-top:16px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
      opacity:.9;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <h1 id="appTitle">Melle's Engineering Wiki</h1>
      </div>

    <div id="homeView">

      <!-- Categorieën boven de zoekbalk -->
      <div class="card" id="catsTop">
        <div class="body">
          <div class="list" id="categoryListTop"></div>
        </div>
      </div>

      <!-- Zoekbalk -->
      <div class="search">
        <input id="searchInput" type="search" placeholder="Zoeken… (bijv. DIN 985, Ruko, band snelheid, zetmaat)" autocomplete="off" />
        <div class="kbd">/</div>
      </div>

      <!-- Zoekresultaten direct onder zoekbalk -->
      <div class="card" id="resultsCard">
        <div class="head">
          <div>
            <p class="title">Zoekresultaten</p>
            <p class="sub muted" id="searchHint">Begin met typen om resultaten te zien</p>
          </div>
          <div class="pill" id="countPill">0 items</div>
        </div>
        <div class="body">
          <div class="list" id="resultList"></div>
        </div>
      </div>

      <div class="footer">v1 • categorieën + zoeken • later tabellen invullen</div>
    </div>

    <!-- Detail view -->
    <div id="pageView" class="card hidden">
      <div class="page">
        <div class="page-top">
          <button class="btn" id="backBtn">← Terug</button>
          <div class="pill" id="crumbPill">…</div>
        </div>
        <h2 id="pageTitle">…</h2>
        <p id="pageDesc">…</p>
        <div id="pageContent"></div>
      </div>
    </div>
  </div>

  <script>
    // ====== JOUW STRUCTUUR (nog geen inhoud ingevuld) ======
    const DATA = [
      {
        id: "bevestigingsmateriaal",
        name: "Bevestigingsmateriaal",
        desc: "Ringen en moeren",
        items: [
          { id: "din125a", name: "DIN 125-A Sluitringen", keywords: ["din125", "din 125-a", "sluitring", "ring"], desc: "" },
          { id: "din934",  name: "DIN 934 Moeren",        keywords: ["din934", "moer", "moeren"], desc: "" },
          { id: "din985",  name: "DIN 985 Borgmoeren",    keywords: ["din985", "borgmoer", "nyloc"], desc: "" },
          { id: "din9021", name: "DIN 9021 Carrosserieringen", keywords: ["din9021", "carrosserie", "carrosseriering", "ring"], desc: "" }
        ]
      },
      {
        id: "gereedschap",
        name: "Gereedschap afmetingen",
        desc: "Sets en gereedschappen",
        items: [
          { id: "ruko245048ro", name: "Ruko 245048RO Machinetapboorset", keywords: ["ruko", "245048ro", "machinetap", "tapboor", "tap"], desc: "" },
          { id: "facom440",     name: "Facom 440", keywords: ["facom", "440", "sleutel", "steeksleutel"], desc: "" }
        ]
      },
      {
        id: "formules",
        name: "Formules",
        desc: "Berekingen voor werk",
        items: [
          { id: "bandsnelheid", name: "Band snelheid", keywords: ["band", "snelheid", "m/min", "rpm", "transportband"], desc: "" },
          { id: "hydraulischekracht", name: "Hydraulische kracht", keywords: ["hydrauliek", "kracht", "druk", "bar", "cilinder"], desc: "" }
        ]
      },
      {
        id: "juffermans",
        name: "Juffermans Machinebouw",
        desc: "Interne kennis",
        items: [
          { id: "dertec", name: "Dertec", keywords: ["dertec"], desc: "" },
          { id: "minimale-zetmaat", name: "Minimale zetmaat", keywords: ["zetmaat", "zetten", "plaatwerk"], desc: "" },
          { id: "insnijding", name: "Insnijding", keywords: ["insnijding", "plaatwerk", "zetwerk"], desc: "" },
          { id: "zichtzijde", name: "Zichtzijde aangeven", keywords: ["zichtzijde", "aangeven", "plaatwerk"], desc: "" }
        ]
      }
    ];

    // ====== APP LOGICA ======
    const $ = (sel) => document.querySelector(sel);
    const homeView = $("#homeView");
    const pageView = $("#pageView");
    const resultList = $("#resultList");
    const searchInput = $("#searchInput");
    const searchHint = $("#searchHint");
    const countPill = $("#countPill");

    function allItems(){
      const out = [];
      for (const cat of DATA){
        for (const item of cat.items){
          out.push({
            catId: cat.id,
            catName: cat.name,
            catDesc: cat.desc,
            ...item
          });
        }
      }
      return out;
    }
    const ITEMS = allItems();

    function setCount(){
      countPill.textContent = `${ITEMS.length} items`;
    }

    function renderCategories(){
      const lists = [$("#categoryListTop")].filter(Boolean);

      lists.forEach(list => {
        list.innerHTML = "";
        DATA.forEach(cat => {
          const el = document.createElement("div");
          el.className = "row";
          el.innerHTML = `
            <div class="left">
              <p class="name">${cat.name}</p>
              <p class="meta">${cat.desc}</p>
            </div>
            <div class="chev">›</div>
          `;
          el.addEventListener("click", () => openCategory(cat.id));
          list.appendChild(el);
        });
      });
    }

    function renderResults(q){
      const query = q.trim().toLowerCase();
      resultList.innerHTML = "";

      if (!query){
        searchHint.textContent = "Begin met typen om resultaten te zien";
        return;
      }

      const hits = ITEMS
        .map(it => {
          const hay = [
            it.name,
            it.desc || "",
            it.catName,
            ...(it.keywords || [])
          ].join(" ").toLowerCase();
          return { it, ok: hay.includes(query) };
        })
        .filter(x => x.ok)
        .slice(0, 25)
        .map(x => x.it);

      searchHint.textContent = hits.length ? `${hits.length} resultaat/resultaten` : "Geen resultaten";

      for (const it of hits){
        const el = document.createElement("div");
        el.className = "row";
        el.innerHTML = `
          <div class="left">
            <p class="name">${it.name}</p>
            <p class="meta">${it.catName}</p>
          </div>
          <div class="chev">›</div>
        `;
        el.addEventListener("click", () => openItem(it.catId, it.id));
        resultList.appendChild(el);
      }
    }

    function openCategory(catId){
      const cat = DATA.find(c => c.id === catId);
      if (!cat) return;
      location.hash = `#/cat/${catId}`;

      showPage({
        crumb: cat.name,
        title: cat.name,
        desc: cat.desc,
        content: (() => {
          const wrap = document.createElement("div");
          const list = document.createElement("div");
          list.className = "list";

          for (const item of cat.items){
            const row = document.createElement("div");
            row.className = "row";
            row.innerHTML = `
              <div class="left">
                <p class="name">${item.name}</p>
                <p class="meta">${item.desc || ""}</p>
              </div>
              <div class="chev">›</div>
            `;
            row.addEventListener("click", () => openItem(catId, item.id));
            list.appendChild(row);
          }

          wrap.appendChild(list);
          return wrap;
        })()
      });
    }

    function openItem(catId, itemId){
      const it = ITEMS.find(x => x.catId === catId && x.id === itemId);
      if (!it) return;
      location.hash = `#/item/${catId}/${itemId}`;

      const content = document.createElement("div");
      const p = document.createElement("p");
      p.className = "muted";
      p.textContent = "Nog geen inhoud. Voeg straks een tabel/tekst toe in de DATA bij dit item.";
      content.appendChild(p);

      const note = document.createElement("div");
      note.className = "note";
      note.textContent = "Tip: straks kun je hier tabellen toevoegen, of een reken-tool (bij Formules).";
      content.appendChild(note);

      showPage({
        crumb: `${it.catName} • ${it.name}`,
        title: it.name,
        desc: it.desc || it.catDesc || "",
        content
      });
    }

    function showHome(){
      homeView.classList.remove("hidden");
      pageView.classList.add("hidden");
      $("#crumbPill").textContent = "Home";
    }

    function showPage({crumb, title, desc, content}){
      homeView.classList.add("hidden");
      pageView.classList.remove("hidden");
      $("#crumbPill").textContent = crumb || "";
      $("#pageTitle").textContent = title || "";
      $("#pageDesc").textContent = desc || "";
      const holder = $("#pageContent");
      holder.innerHTML = "";
      holder.appendChild(content);
      window.scrollTo({top:0, behavior:"instant"});
    }

    function route(){
      const h = location.hash || "";
      if (!h || h === "#/" || h === "#"){
        showHome();
        return;
      }
      const parts = h.replace(/^#\//,"").split("/").filter(Boolean);
      if (parts[0] === "cat" && parts[1]){
        openCategory(parts[1]);
        return;
      }
      if (parts[0] === "item" && parts[1] && parts[2]){
        openItem(parts[1], parts[2]);
        return;
      }
      showHome();
    }

    // Back button
    $("#backBtn").addEventListener("click", () => {
      if (location.hash && location.hash !== "#/" && location.hash !== "#"){
        history.back();
        setTimeout(() => {
          if (!pageView.classList.contains("hidden") && (location.hash === "" || location.hash === "#")){
            showHome();
            location.hash = "#/";
          }
        }, 250);
      } else {
        showHome();
        location.hash = "#/";
      }
    });

    // Search events
    searchInput.addEventListener("input", (e) => renderResults(e.target.value));
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter"){
        const q = searchInput.value.trim().toLowerCase();
        if (!q) return;
        const hit = ITEMS.find(it => {
          const hay = [it.name, it.desc || "", it.catName, ...(it.keywords || [])].join(" ").toLowerCase();
          return hay.includes(q);
        });
        if (hit) openItem(hit.catId, hit.id);
      }
    });

    // "/" focuses search (desktop)
    document.addEventListener("keydown", (e) => {
      if (e.key === "/" && document.activeElement !== searchInput){
        e.preventDefault();
        searchInput.focus();
      }
    });

    window.addEventListener("hashchange", route);

    // Init
    setCount();
    renderCategories();
    renderResults("");
    if (!location.hash) location.hash = "#/";
    route();
  </script>
</body>
</html>
